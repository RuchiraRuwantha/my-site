params:
  title: "Hugo Profile"
  description: Text about my cool site
  # staticPath: ""  # The path to serve the static files from
  favicon: "/fav.png"

  # Whether to serve bootstrap css and js files from CDN or not. Can be set to true, "css" or "js" to choose between
  # serving both, only the css, or only the js files through the CDN. Any other value will make so that CDN is not used.
  # Note the lack of "" in true, it should be of boolean type.
  useBootstrapCDN: false

  # If you want to load dynamically responsive images from Cloudinary
  # This requires your images to be uploaded + hosted on Cloudinary
  # Uncomment and change YOUR_CLOUD_NAME to the Cloud Name in your Cloudinary console
  # cloudinary_cloud_name: "YOUR_CLOUD_NAME"

  # Whether to add mathjax support on all pages. Alternatively, you can opt-in per page by adding `mathjax: true` in the frontmatter.
  mathjax: false

  # Whether the fade animations on the home page will be enabled
  animate: true

  theme:
    # disableThemeToggle: true
    # defaultTheme: "light" # dark

  font:
    fontSize: 1rem # default: 1rem
    fontWeight: 400 # default: 400
    lineHeight: 1.5 # default: 1.5
    textAlign: left # default: left

  # color preference
  # When using hex codes for colors, quotations must be used along with the # sign
  # color:
  #   textColor: "#343a40"
  #   secondaryTextColor: "#6c757d"
  #   textLinkColor: "#007bff"
  #   backgroundColor: "#eaedf0"
  #   secondaryBackgroundColor: "#64ffda1a"
  #   primaryColor: "#007bff"
  #   secondaryColor: "#f8f9fa"

  #   darkmode:
  #     textColor: "#e4e6eb"
  #     secondaryTextColor: "#b0b3b8"
  #     textLinkColor: "#ffffff"
  #     backgroundColor: "#18191a"
  #     secondaryBackgroundColor: "#212529"
  #     primaryColor: "#ffffff"
  #     secondaryColor: "#212529"

  # If you want to customize the menu, you can change it here
  navbar:
    align: ms-auto # Left: ms-auto | center: mx-auto | right: me-auto | Default: ms-auto
    # brandLogo: "/logo.png" # Logo for the brand | default is the favicon variable
    # showBrandLogo: false # Show brand logo in nav bar | default is true
    brandName: "Hugo Profile" # Brand name for the brand | default is the title variable
    disableSearch: false
    # searchPlaceholder: "Search"
    stickyNavBar:
      enable : true
      showOnScrollUp : true
    enableSeparator: false
    menus:
      disableAbout: false
      disableExperience: false
      disableEducation: false
      disableProjects: false
      disableAchievements: false
      disableContact: false

  # Hero
  hero:
    enable: true
    intro: "Hi, my name is"
    title: "Ruchira."
    subtitle: "I build things for the web"
    content: "With a career rooted in both Frontend and Backend engineering, I specialize in developing robust systems that handle millions of records and complex business logic.
     My technical stack centers on the JavaScript ecosystem (React/Node.js) supplemented by experience in .NET, SQL, and modern data warehousing. I have a proven track record of
      designing reusable component systems and leading technical spikes for mission-critical HCM and logistics platforms. As a certified Azure AI Engineer, I prioritize an 
      AI-first approach to development, ensuring that every feature I build is optimized for maintainability, security, and superior user experience in data-driven environments."
    image: /images/side_img.png
    bottomImage:
      enable: true
    # roundImage: true # Make hero image circular | default false
    button:
      enable: true
      name: "Resume"
      url: "/CV/Ruchira_Ruwantha.pdf"
      download: true
      newPage: false
    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-github
          url: https://github.com/RuchiraRuwantha
        # - icon: fab fa-x-twitter
        #   url: https://example.com
        - icon: fab fa-linkedin
          url: https://www.linkedin.com/in/ruchira-ruwantha
        - icon: fab fa-leet-code
          url: https://leetcode.com/u/rruwantha/
      customIcons:
        - icon: /fav.png
          url: "https://example.com"

  # About
  about:
    enable: true
    title: "About Me"
    image: "/images/me.png"
    content: |-
      I am a software developer with a passion for web development. I have experience in Javascript, Typescript, and front-end libraries like React and back-end server environments like Node.js and Javascript testing automation frameworks like Cypress. I am currently working as a software engineer at [Verdentra (Pvt) Ltd.](https://www.verdentra.com/).

      I am currently working on a project that is a Banking-as-a-Service (BaaS) platform which will enables digital businesses across various industries to offer embedded financial services to their underserved customers.
    skills:
      enable: true
      title: "Here are a few technologies I've been working with recently:"
      items:
        - "TypeScript"
        - "Next.js"
        - "React"
        - "JavaScript"
        - "Cypress"
        - "Node.js"
        - "Express.js"
        - ".NET"
        - "HTML"

        - "SQL"
        - "Snowflake"
        - "Jest"
        - "Azure"
        - "AWS"

  # Experience
  experience:
    enable: true
    # title: "Custom Name"
    items:
      - company: "Verdentra - ConceptVines"
        companyUrl: "https://www.Verdentra.com/"
        jobs:
          - name: "Software Engineer"
            date: "Sept 2022 - present"
            content: |
              I am currently working as a software engineer (Hybrid) at [Verdenra](https://www.verdenra.com/).

              - Developed and maintained high-performance web applications using React, Next.js, and TypeScript for B2B and B2C platforms serving distributed users.
              - Built reusable, scalable component architectures following modern React best practices, improving UI consistency and reducing development time by ~20%.
              - Integrated complex RESTful APIs and collaborated closely with backend teams to deliver seamless data-driven user experiences.
              - Implemented state management using Redux, React Hooks, and Context API to support scalable frontend architecture.
              - Optimized rendering logic and application performance, improving performance metrics and page load times by up to 25%.
              - Ensured cross-browser compatibility and responsive design across major browsers and devices.
              - Developed unit and end-to-end tests using Jest and Cypress, improving application stability and reducing post-release issues.
              - Collaborated with product owners, designers, and engineers in Agile teams, participating in sprint planning, backlog refinement, and code reviews.
            info:
              content: Working as a software Engineer
            featuredItems:
              fontAwesomeIcons:
                - icon: fa-brands fa-linkedin
                  url: https://www.linkedin.com/company/verdentra/posts/?feedView=all

      - company: "LiveRoom"
        companyUrl: "https://liveroom.xyz"
        jobs:
          - name: "Software Developer"
            date: "Mar 2021 - Sep 2022"
            info:
              content: I worked as a software developer for more than one and half years in LiveRoom.
            content: |
              I worked as a software engineer at [LiveRoom (Pvt) Ltd.](https://liveroom.xyz) in Colombo, Sri Lanka.

              - Developed scalable frontend applications using React, Next.js, TypeScript, HTML5, and CSS3, delivering responsive and high-performance user interfaces.
              - Designed and implemented the OGMO Editor and Admin Dashboard using React and Material-UI, enabling internal teams to manage and configure AR-based e-commerce experiences.
              - Built reusable component libraries and modular UI architecture, improving maintainability and accelerating feature development.
              - Implemented core NFT marketplace functionality including minting, buying, selling, and asset management workflows for blockchain-based digital assets.
              - Integrated RESTful APIs and blockchain services to enable secure transactions and real-time data interactions.
              - Implemented decentralized asset storage using AWS S3 and IPFS, ensuring reliable storage and retrieval of NFT media assets.
              - Optimized frontend performance using efficient rendering strategies and state management patterns, improving application responsiveness by ~25%.
              - Developed end-to-end testing suites using Cypress and integrated automated tests into CI/CD pipelines to improve deployment reliability.
              - Ensured cross-browser compatibility, responsive design, and accessibility across modern browsers and devices.
              - Collaborated with product managers, designers, and backend engineers in Agile Scrum teams, contributing to sprint planning, code reviews, and continuous delivery.

      - company: "Fiverr"
        companyUrl: "#"
        jobs:
          - name: "Freelance Developer"
            date: "2020 - Present"
            info:
              content: I am working as a Freelance Developer for nearly 2 years.
            content: |
              I contributed to multiple projects of small to mid scale in these capacity.

              - Web development
              - API integration
              - Functionality implementation

